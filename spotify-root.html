<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPOTIFY ROOT - SHADOW FACE SHOP</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #7506f3;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: rgb(3, 233, 164);
      border-bottom: 1px solid #ee0404;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 38px;
      font-weight: bold;
    }

    .nav {
      display: flex;
      gap: 30px;
      font-size: 18px;
    }

    .nav a {
      text-decoration: none;
      color: #f8066b;
    }

    .container {
      max-width: 1300px;
      margin: 50px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      padding: 20px;
    }

    .product-image img {
      width: 100%;
      border-radius: 10px;
      background: rgb(240, 6, 6);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .breadcrumb {
      color: #666;
      margin-bottom: 20px;
      font-size: 15px;
    }

    .category {
      color: #5bee05;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .title {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .price {
      font-size: 36px;
      font-weight: bold;
      color: #fc09bf;
      margin-bottom: 30px;
    }

    .label {
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
      font-size: 18px;
    }

    select {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: 1px solid #07e6ee;
      border-radius: 6px;
      margin-bottom: 30px;
      background: rgb(4, 159, 248);
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .cart-btn {
      background: #60a5fa;
      color: white;
    }

    .back-container {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #e3f2fd;
      border: 2px solid #2196f3;
      border-radius: 8px;
      padding: 14px 20px;
    }

    .message-text {
      color: #0d47a1;
      font-weight: 600;
      font-size: 16px;
    }

    .blue-back-btn {
      background-color: #2196f3;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .blue-back-btn:hover {
      background-color: #1976d2;
    }

    .features {
      margin-top: 20px;
      line-height: 1.8;
      font-size: 18px;
    }

    .features h3 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    footer {
      text-align: center;
      padding: 30px;
      margin-top: 50px;
      background: white;
      border-top: 1px solid #ddd;
      font-size: 18px;
    }

    .video-background {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -100; /* Keeps it behind everything */
      background-size: cover;
      overflow: hidden;
    }

    #myVideo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover; /* Ensures video fills the screen without stretching */
    }

    /* Optional: Add a dark overlay so text is easier to read */
    .video-background::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4); /* Black with 40% transparency */
    }

    @media(max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        gap: 20px;
      }

      .nav {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">SHADOW FACE SHOP</div>
    <div class="nav">
      <a href="#">Cart</a>
      <a href="#">Checkout</a>
      <a href="#">My Account</a>
      <a href="#">Registration</a>
      <a href="#">Shop</a>
    </div>
  </header>

  <section class="container">

    <div class="product-image">
      <img src="spofitiy.jfif" alt="SPOTIFY ROOT">
    </div>

    <div class="product-details">
      <div class="breadcrumb">Home / Products / SPOTIFY ROOT</div>
      <div class="category">Premium APK</div>

      <div class="title">SPOTIFY ROOT</div>
      <div class="price" id="priceDisplay">₹370.00</div>

      <label class="label">Choose Plan:</label>
      <select id="planSelect" onchange="updatePrice()">
        <option>7 DAY — ₹370</option>
        <option>15 DAY — ₹650</option>
        <option>30 DAY — ₹1020</option>
      </select>

      <div class="buttons">
        <div class="back-container">
          <span class="message-text">Need to return to the previous page?</span>
          <button type="button" class="blue-back-btn" onclick="history.back()">
            &#8592; Go Back
          </button>
        </div>
        <a href="https://t.me/SHADOWFACE001" target="_blank" class="btn cart-btn">Add To Cart</a>
      </div>

      <div class="features">
        <h3>Features</h3>
        <ul>
          <li>Speed Hack</li>
          <li>ESP LINE</li>
          <li>ESP BOX</li>
          <li>HEADSHOT RATE</li>
          <li>AIMBOT TIRO</li>
        </ul>
      </div>
    </section>

  <footer>
    Copyright © 2026 SHADOW FACE SHOP
  </footer>

  <div class="video-background">
    <video autoplay muted loop playsinline id="myVideo">
      <source src="your-video-link.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>
  </div>

  <script>
    function updatePrice() {
      const plan = document.getElementById("planSelect").value;
      const price = document.getElementById("priceDisplay");

      if (plan.includes("7 DAY")) {
        price.innerText = "₹370.00";
      } else if (plan.includes("15 DAY")) {
        price.innerText = "₹650.00";
      } else if (plan.includes("30 DAY")) {
        price.innerText = "₹1020.00";
      }
    }
    updatePrice();
  </script>
</body>
</html>
